<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Website</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="assets/r.ico" class="id-icon">
</head>
<body>
    <div class="container">
        <header>
            <span>personal website</span>
            <div class="underline"></div>
        </header>
        <nav>
            <ul>
                <li><a href="/home">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/socials">Socials</a></li>
                <li><a href="/projects">Projects</a></li>
            </ul>
        </nav>
        <main>
            <div class="about-section">
                <span>about me</span>
            </div>
            <i><img src="/assets/down.png" alt="down" id="down-arrowv2"></i>
            <div class="divider-about"></div>
            <div class="profile">
            <img id="circle-profile" src="assets/a7c37f61-b29a-4304-920a-ce40bda43034.jpg" alt="circle-profile">
            <span class="name" id="profile-name">Loading...</span>
            <small id="profile-title">Loading...</small>
            </div>
            <div class="education">
                <span>education</span>
                <small id="education-text">Loading...</small>
            </div>
            <div class="interests">
                <span>other interests</span>
                <ul id="interests-list">
                    <li>Loading...</li>
                </ul>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
    <script>
        // Load profile data from API
        async function loadProfile() {
            try {
                const response = await fetch('/api/profile');
                const result = await response.json();
                
                if (result.success && result.data) {
                    const profile = result.data;
                    document.getElementById('profile-name').textContent = profile.name || 'josh cabradilla';
                    document.getElementById('profile-title').textContent = profile.title || 'aspiring front end engineer, fresh grad BSIT student';
                    document.getElementById('education-text').textContent = profile.education || 'Graduated as BSIT - Bachelor of Science in Information Technology at PCLU (Polytechnic College of La Union)';
                    
                    if (profile.profile_image) {
                        document.getElementById('circle-profile').src = profile.profile_image;
                    }
                    
                    if (profile.interests && Array.isArray(profile.interests)) {
                        const interestsList = document.getElementById('interests-list');
                        interestsList.innerHTML = '';
                        profile.interests.forEach(interest => {
                            const li = document.createElement('li');
                            li.textContent = interest;
                            interestsList.appendChild(li);
                        });
                    }
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }
        
        loadProfile();
    </script>
</body>
</html>
