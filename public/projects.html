<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Website</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="assets/r.ico" class="id-icon">
</head>
<body>
    <div class="container">
        <header>
            <span>personal website</span>
            <div class="underline"></div>
        </header>
        <nav>
            <ul>
                <li><a href="/home">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/socials">Socials</a></li>
                <li><a href="/projects">Projects</a></li>
            </ul>
        </nav>
        <main>
            <div id="projects-container">
                <!-- Projects will be loaded dynamically -->
                <div class="noProjectYet">
                    <span id="alert">Loading projects...</span>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
    <script>
        // Load projects from API
        async function loadProjects() {
            try {
                const response = await fetch('/api/projects');
                const result = await response.json();
                
                const container = document.getElementById('projects-container');
                
                if (result.success && result.data && result.data.length > 0) {
                    container.innerHTML = '<span class="highlight" style="position: absolute; top: 20%; left: 45%;">Projects</span>';
                    
                    result.data.forEach((project, index) => {
                        const projectDiv = document.createElement('div');
                        projectDiv.className = 'project-item';
                        projectDiv.style.cssText = `
                            position: absolute;
                            top: ${30 + index * 15}%;
                            left: 20%;
                            width: 60%;
                            padding: 20px;
                            background: rgba(255, 255, 255, 0.05);
                            border-radius: 10px;
                            margin-bottom: 20px;
                        `;
                        
                        projectDiv.innerHTML = `
                            <h3 style="color: var(--text-light); font-family: 'Quicksand', sans-serif; margin-bottom: 10px;">${project.title}</h3>
                            ${project.description ? `<p style="color: var(--text-light); margin-bottom: 10px;">${project.description}</p>` : ''}
                            ${project.technologies ? `<small style="color: var(--text-light); opacity: 0.7;">${project.technologies}</small>` : ''}
                            ${project.link ? `<a href="${project.link}" target="_blank" style="color: var(--text-light); display: block; margin-top: 10px;">View Project →</a>` : ''}
                        `;
                        
                        container.appendChild(projectDiv);
                    });
                } else {
                    container.innerHTML = `
                        <div class="noProjectYet">
                            <span id="alert">No projects available yet</span>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading projects:', error);
                document.getElementById('alert').textContent = 'Error loading projects';
            }
        }
        
        loadProjects();
    </script>
</body>
</html>
